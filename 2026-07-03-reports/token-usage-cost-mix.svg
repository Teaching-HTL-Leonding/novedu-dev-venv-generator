<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300"><rect x="0.5" y="0.5" width="759" height="299" rx="8" fill="#fcfcfb" stroke="rgba(11,11,11,0.10)"/><text x="24" y="34" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#0b0b0b" font-weight="600">Share of tokens vs. share of cost — workshop day</text><text x="24" y="54" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#898781">Output is 4% of tokens but 47% of (reference) cost; cached input is 81% of tokens but 18% of cost</text><rect x="90" y="66" width="10" height="10" rx="3" fill="#2a78d6"/><text x="106" y="75" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e">New input</text><rect x="198" y="66" width="10" height="10" rx="3" fill="#1baf7a"/><text x="214" y="75" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e">Cached input</text><rect x="330" y="66" width="10" height="10" rx="3" fill="#eda100"/><text x="346" y="75" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e">Output</text><text x="78" y="112" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12.5" fill="#0b0b0b" font-weight="600" text-anchor="end">Tokens</text><rect x="90.00" y="96" width="100.19" height="24" rx="4" fill="#2a78d6"/><text x="140.09629315190875" y="112" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#ffffff" font-weight="600" text-anchor="middle">15.5%</text><rect x="190.19" y="96" width="522.84" height="24" rx="4" fill="#1baf7a"/><text x="451.61078107151775" y="112" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#ffffff" font-weight="600" text-anchor="middle">80.9%</text><rect x="713.03" y="96" width="22.97" height="24" rx="4" fill="#eda100"/><text x="724.514487919609" y="90" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#0b0b0b" font-weight="600" text-anchor="middle">3.6%</text><text x="78" y="176" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12.5" fill="#0b0b0b" font-weight="600" text-anchor="end">Cost*</text><rect x="90.00" y="160" width="222.96" height="24" rx="4" fill="#2a78d6"/><text x="201.4775788822513" y="176" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#ffffff" font-weight="600" text-anchor="middle">34.5%</text><rect x="312.96" y="160" width="116.35" height="24" rx="4" fill="#1baf7a"/><text x="371.12766034888125" y="176" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#ffffff" font-weight="600" text-anchor="middle">18.0%</text><rect x="429.30" y="160" width="306.70" height="24" rx="4" fill="#eda100"/><text x="582.6500814666299" y="176" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#ffffff" font-weight="600" text-anchor="middle">47.5%</text><text x="90" y="214" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#898781">* reference pricing (gpt-5.4-mini rates); SCCH's actual cost basis differs</text></svg>